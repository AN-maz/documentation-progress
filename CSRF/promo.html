<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo Cashback Steam Style - Dynamic Background</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-border {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.8);
        }
        @keyframes float {
            0% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(-20px) scale(1.05);
            }

            100% {
                transform: translateY(0px) scale(1);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .animate-float-delayed {
            animation: float 6s ease-in-out 3s infinite;
        }
    </style>
</head>

<body
    class="relative min-h-screen flex items-center justify-center p-4 font-sans text-white overflow-hidden bg-[#0d1117]">

    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=1920&auto=format&fit=crop"
            alt="Background" class="w-full h-full object-cover opacity-60" />
    </div>

    <div
        class="absolute inset-0 bg-gradient-to-b from-[#171a21]/80 via-[#1b2838]/70 to-[#171a21]/90 backdrop-blur-[6px] z-0">
    </div>

    <div
        class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-sky-600/30 rounded-full blur-[100px] z-0 animate-float pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-600/20 rounded-full blur-[100px] z-0 animate-float-delayed pointer-events-none">
    </div>
    <div
        class="relative z-10 bg-[#1b2838]/95 backdrop-blur-xl rounded-lg border border-gray-600 shadow-[0_0_40px_rgba(0,0,0,0.8)] max-w-sm w-full overflow-hidden transform transition duration-300 hover:border-sky-500 hover:scale-[1.02]">

        <div class="bg-[#c7d5e0]/10 border-b border-gray-700 text-center py-3 relative overflow-hidden">
            <div
                class="absolute inset-0 bg-gradient-to-r from-transparent via-yellow-400/20 to-transparent -z-10 translate-x-[-100%] animate-[shimmer_2s_infinite]">
            </div>
            <span
                class="bg-yellow-400 text-[#171a21] font-extrabold px-6 py-1 rounded-full text-xs uppercase tracking-widest shadow-lg">
                Penawaran Terbatas!
            </span>
        </div>

        <div class="p-8 text-center relative">

            <div class="flex justify-center mb-6">
                <div class="relative group cursor-pointer">
                    <div
                        class="absolute inset-0 bg-sky-500 rounded-full blur-xl opacity-60 group-hover:opacity-100 transition-opacity duration-300">
                    </div>
                    <div
                        class="bg-[#2a475e] p-5 rounded-full inline-block relative border-2 border-sky-400 shadow-inner">
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="h-14 w-14 text-sky-300 group-hover:scale-110 group-hover:rotate-12 transition-transform duration-300"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                </div>
            </div>

            <h2 class="text-3xl font-black text-white mb-2 tracking-tight glow-text">Cashback 50%</h2>
            <p class="text-gray-400 text-sm mb-7 px-2 leading-relaxed">
                Nikmati hadiah cashback hingga <span class="font-bold text-sky-400">Rp 50.000</span> untuk transaksi
                pertamamu minggu ini!
            </p>

            <div
                class="bg-[#101822] border-2 border-sky-900/60 rounded-md py-4 px-5 mb-7 relative group hover:border-sky-400 transition-colors cursor-copy">
                <span
                    class="text-[10px] text-sky-400 absolute -top-2.5 left-4 bg-[#1b2838] px-2 font-mono uppercase tracking-wider">Kode
                    Kupon</span>
                <span class="font-mono text-2xl font-bold text-sky-300 tracking-widest glow-text">PURW42CAM</span>

                <div
                    class="absolute inset-0 bg-sky-500/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded backdrop-blur-[2px]">
                    <span class="text-xs font-bold text-white tracking-widest">KLIK UNTUK SALIN</span>
                </div>
            </div>


            <form action="http://localhost:5000/checkout" method="POST">

                <input type="hidden" name="total_harga" value="2000000">
                <input type="hidden" name="kirim_ke" value="Alamat Rumah Hacker (Jl. Maling No. 4)">

                <button
                    class="w-full bg-gradient-to-r from-[#47bfff] to-[#1a44c2] hover:from-[#5ac8ff] hover:to-[#2255d4] text-white font-extrabold py-3.5 px-6 rounded shadow-[0_0_20px_rgba(71,191,255,0.3)] transition duration-300 ease-in-out transform hover:-translate-y-1 hover:shadow-[0_0_30px_rgba(71,191,255,0.6)]">
                    Klaim Hadiah Sekarang
                </button>
            </form>

            <p class="text-[11px] text-gray-500 mt-5 italic">
                *Syarat dan ketentuan berlaku. Berlaku hingga 31 Desember.
            </p>

        </div>
    </div>

</body>

</html>
