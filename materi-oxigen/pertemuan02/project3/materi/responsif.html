<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsif - Pertemuan 2</title>

    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            grid-template-areas:
                "header header"
                "sidebar main"
                "footer footer";
            gap: 10px;
        }

        .header {
            grid-area: header;
            background-color: #f8b400;
            padding: 20px;
            text-align: center;
        }

        .sidebar {
            grid-area: sidebar;
            background-color: #4caf50;
            padding: 20px;
        }

        .main {
            grid-area: main;
            background-color: #2196f3;
            padding: 20px;
        }

        .footer {
            grid-area: footer;
            background-color: #f44336;
            padding: 20px;
            text-align: center;
        }
        @media(max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "header"
                    "sidebar"
                    "main"
                    "footer";
            }
        }

        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "header"
                    "main"
                    "sidebar"
                    "footer";
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">Header</div>
        <div class="sidebar">Sidebar</div>
        <div class="main">Main Content</div>
        <div class="footer">footer</div>
    </div>

</body>

</html>
