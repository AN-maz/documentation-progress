<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRID | Pertemuan 2</title>

    <style>
        .parent {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            /* fraction = bagian ruang */
            gap: 20px;
        }

        .child {
            background-color: lightblue;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            min-height: 120px;
        }

        /* GRID TEMPLATE AREA */

        .parent2 {
            display: grid;
            grid-template-areas:
                "header header header"
                "sidebar main main"
                "footer footer footer";
            gap: 20px;
        }

        .header {
            grid-area: header;

            background-color: lightgray;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .sidebar {
            grid-area: sidebar;

            background-color: lightblue;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .main {
            grid-area: main;

            background-color: lightgreen;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .footer {
            grid-area: footer;

            background-color: lightgray;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        /* Contoh */

        .container {
            display: grid;
            gap: 20px;
            height: 100vh;

            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: 100px 1fr 100px;

            grid-template-areas:
                "header header header"
                "sidebar main main"
                "footer footer footer";
        }
    </style>
</head>

<body>

    <div class="parent">
        <div class="child">1</div>
        <div class="child">2</div>
        <div class="child">3</div>
        <div class="child">4</div>
        <div class="child">5</div>
        <div class="child">6</div>
    </div>

    <hr>

    <div class="parent2">
        <div class="header">Header</div>
        <div class="sidebar">Sidebar</div>
        <div class="main">Main Content</div>
        <div class="footer">Footer</div>
    </div>

    <hr>
    <h1 style="text-align: center;">Contoh</h1>
    <hr>

    <!-- Contoh  -->

    <div class="container">
        <header class="header">My Website</header>
        <aside class="sidebar">
            <p>Menu 1</p>
            <p>Menu 2</p>
            <p>Menu 3</p>
        </aside>
        <main class="main">
            <h2>Selamat Datang</h2>
            <p>Ini adalah area konten utama website.</p>
        </main>
        <footer class="footer">Copyright 2026</footer>
    </div>
</body>

</html>
