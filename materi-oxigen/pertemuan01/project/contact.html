<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyWeb - Contact</title>
    <!-- <link rel="stylesheet" href="style.css" /> -->
  </head>
  <body>
    <header>
      <h1>MyWeb</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main>
      <h2>Hubungi Saya</h2>
      <p>Silakan isi form di bawah ini jika ada info loker atau project web.</p>

      <form action="#" method="POST" class="contact-form">
        <div class="form-group">
          <label for="name">Nama:</label>
          <input type="text" id="name" name="name" required placeholder="Masukkan nama kamu" />
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required placeholder="Masukkan email kamu" />
        </div>

        <div class="form-group">
          <label for="message">Pesan:</label>
          <textarea id="message" name="message" rows="5" required placeholder="Tulis pesanmu di sini..."></textarea>
        </div>

        <button type="submit">Kirim Pesan</button>
      </form>
    </main>

    <footer>
      <p>&copy; 2026 ganti presiden</p>
    </footer>
  </body>
</html>
