<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontak Saya - Blog Purwa</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Catatan Purwa</h1>
      <nav>
        <ul>
          <li><a href="index.html">Beranda</a></li>
          <li><a href="about.html">Tentang Saya</a></li>
          <li><a href="contact.html">Kontak Saya</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h2>Hubungi Saya</h2>
      <p>
        Punya pertanyaan, ide proyek kolaborasi, atau sekadar ingin ngobrol santai seputar <em>coding</em>? 
        Jangan ragu untuk mengirim pesan melalui formulir di bawah ini!
      </p>

      <br />

      <form action="#" method="POST">
        <div>
          <label for="nama">Nama Lengkap:</label><br />
          <input type="text" id="nama" name="nama" required placeholder="Masukkan nama kamu" />
        </div>
        <br />
        
        <div>
          <label for="email">Alamat Email:</label><br />
          <input type="email" id="email" name="email" required placeholder="contoh@email.com" />
        </div>
        <br />
        
        <div>
          <label for="pesan">Pesan:</label><br />
          <textarea id="pesan" name="pesan" rows="5" required placeholder="Tulis pesanmu di sini..."></textarea>
        </div>
        <br />
        
        <button type="submit">Kirim Pesan</button>
      </form>

    </main>

    <footer>
      <p>&copy; 2026 Purwa. Dibuat dengan HTML & CSS.</p>
    </footer>
  </body>
</html>
